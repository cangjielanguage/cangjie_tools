<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJProf - Heap Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        .header {
            background: #16213e;
            padding: 15px 30px;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            color: #e94560;
            font-size: 24px;
        }
        .tabs {
            display: flex;
            background: #16213e;
            padding: 0 30px;
        }
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #888;
            transition: all 0.3s;
        }
        .tab:hover {
            color: #eee;
        }
        .tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        .content {
            padding: 30px;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .stat {
            display: inline-block;
            margin-right: 30px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .error {
            color: #e94560;
            padding: 20px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #0f3460;
        }
        th {
            color: #e94560;
            font-weight: 600;
        }
        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        /* Sunburst chart */
        #sunburst-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #sunburst {
            width: 600px;
            height: 600px;
        }
        .sunburst-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* Dominance table */
        .dominance-table {
            width: 520px;
            flex-shrink: 0;
        }
        .dominance-table table {
            width: 100%;
            font-size: 14px;
        }
        .dominance-table th,
        .dominance-table td {
            padding: 8px 10px;
        }
        .dominance-table td {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Fragment layout */
        .fragment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .fragment-item {
            background: #0f3460;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }
        .fragment-item .value {
            font-size: 20px;
            font-weight: bold;
            color: #00d9ff;
        }
        .fragment-item .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .progress-bar {
            background: #0f3460;
            border-radius: 4px;
            height: 24px;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #00d9ff);
            transition: width 0.5s ease;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #888;
        }

        /* View toggle buttons */
        .view-btn {
            background: #0f3460;
            color: #888;
            border: 1px solid #0f3460;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 13px;
            transition: all 0.3s;
        }
        .view-btn:hover {
            color: #eee;
        }
        .view-btn.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }

        /* Tree View */
        #tree-container {
            width: 100%;
            overflow: auto;
            max-height: 600px;
        }
        #tree-container::-webkit-scrollbar {
            width: 4px;
        }
        #tree-container::-webkit-scrollbar-track {
            background: transparent;
        }
        #tree-container::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 2px;
        }
        #tree-container::-webkit-scrollbar-thumb:hover {
            background: #e94560;
        }
        #tree-view {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CJProf Heap Analyzer</h1>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="dominance">Dominance Tree</div>
        <div class="tab" data-tab="fragment">Memory Fragment</div>
    </div>

    <div class="content">
        <!-- Dominance Tree View -->
        <div id="dominance-view" class="card" style="display: grid; grid-template-columns: 1fr 520px; gap: 15px 20px;">
            <h2 style="margin:0; align-self: center;">Top Objects by Retained Size</h2>
            <h2 style="margin:0; color:#e94560; font-size:1.17em; align-self: center;">Top 10 Objects</h2>
            <div style="align-self: start; min-width: 0;">
                <div style="margin-bottom:15px;">
                    <button class="view-btn active" data-view="sunburst">Sunburst</button>
                    <button class="view-btn" data-view="tree">Tree</button>
                </div>
                <div id="sunburst-container">
                    <div id="sunburst"></div>
                </div>
                <div id="tree-container" style="display:none;">
                    <div id="tree-view"></div>
                </div>
                <div class="sunburst-legend" id="sunburst-legend"></div>
            </div>
            <div class="dominance-table" style="align-self: start;">
                <div id="top10-table"></div>
            </div>
        </div>

        <!-- Memory Fragment View -->
        <div id="fragment-view" class="card" style="display:none;">
            <h2>Memory Overview</h2>
            <div id="fragment-summary"></div>
            <h3 style="margin-top:20px;color:#e94560;">Memory Layout</h3>
            <div id="fragment-layout"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const COLOR_PALETTE = ['#e94560', '#00d9ff', '#ff9f43', '#10ac84', '#5f27cd', '#ee5a24', '#0abde3', '#f368e0', '#00d2d3', '#ff6b6b'];

        let currentView = 'sunburst';
        let cachedRoot = null;
        let loadedChildren = new Map();
        let treeNodeMap = new Map();
        let sunburstChart = null;
        let treeChart = null;
        let treeRootData = null;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const tabName = tab.dataset.tab;
                document.getElementById('dominance-view').style.display = tabName === 'dominance' ? 'grid' : 'none';
                document.getElementById('fragment-view').style.display = tabName === 'fragment' ? 'block' : 'none';
            });
        });

        // View switching (Sunburst/Tree)
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;

                document.getElementById('sunburst-container').style.display = currentView === 'sunburst' ? 'flex' : 'none';
                document.getElementById('tree-container').style.display = currentView === 'tree' ? 'block' : 'none';

                if (currentView === 'sunburst' && sunburstChart) {
                    sunburstChart.resize();
                } else if (currentView === 'tree' && treeChart) {
                    treeChart.resize();
                }

                if (cachedRoot) {
                    if (currentView === 'sunburst') {
                        drawSunburst(cachedRoot);
                    } else if (currentView === 'tree') {
                        if (!treeChart) {
                            initTreeView();
                        }
                    }
                }
            });
        });

        // Draw sunburst chart from dominance tree
        async function loadDominanceTree() {
            try {
                const res = await fetch(`${API_BASE}/dominance/tree`);
                const data = await res.json();

                if (!data.nodes || data.nodes.length === 0) {
                    document.getElementById('sunburst').innerHTML = '<div class="loading">No data</div>';
                    return;
                }

                // Build hierarchy from flat nodes
                const nodes = data.nodes;
                const nodeMap = new Map();
                nodes.forEach(n => nodeMap.set(n.id, { ...n, children: [] }));

                let root = null;
                let rootNodes = [];
                nodes.forEach(n => {
                    const node = nodeMap.get(n.id);
                    if (n.parent_id && nodeMap.has(n.parent_id)) {
                        nodeMap.get(n.parent_id).children.push(node);
                    } else {
                        rootNodes.push(node);
                    }
                });

                // 如果有多个根节点，创建虚拟根
                if (rootNodes.length > 1) {
                    root = {
                        id: 0,
                        class_name: 'Root',
                        retained_size: 0,
                        shallow_size: 0,
                        depth: -1,
                        parent_id: 0,
                        instance_count: rootNodes.length,
                        is_clustered: false,
                        is_cutoff: false,
                        children: rootNodes
                    };
                } else if (rootNodes.length === 1) {
                    root = rootNodes[0];
                }

                if (!root) root = nodeMap.get(nodes[0].id);

                cachedRoot = root;
                drawSunburst(root);
                loadTop10();
            } catch (e) {
                document.getElementById('sunburst').innerHTML = '<div class="error">Failed to load dominance tree</div>';
            }
        }

        function drawSunburst(root) {
            if (!sunburstChart) {
                sunburstChart = echarts.init(document.getElementById('sunburst'));
            }

            let colorIndex = 0;
            const classColors = new Map();
            function getColor(name) {
                if (!classColors.has(name)) {
                    classColors.set(name, COLOR_PALETTE[colorIndex++ % COLOR_PALETTE.length]);
                }
                return classColors.get(name);
            }

            function convertNode(node, depth) {
                depth = depth || 0;
                const isLeaf = !node.children || node.children.length === 0;
                const name = node.class_name || `obj${node.id}`;
                const color = depth === 0 ? '#e94560' : getColor(name);

                var result = {
                    name: name,
                    class_name: node.class_name,
                    retained_size: node.retained_size,
                    shallow_size: node.shallow_size,
                    depth: depth,
                    itemStyle: {
                        color: color,
                        opacity: depth === 0 ? 1 : 0.85,
                        borderColor: '#1a1a2e',
                        borderWidth: 1
                    }
                };

                if (isLeaf) {
                    result.value = node.retained_size || 0;
                } else {
                    result.children = node.children.map(function(c) {
                        return convertNode(c, depth + 1);
                    });
                }

                return result;
            }

            var data = convertNode(root);

            sunburstChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#16213e',
                    borderColor: '#e94560',
                    borderWidth: 1,
                    textStyle: { color: '#eee', fontSize: 12 },
                    padding: [10, 14],
                    formatter: function(params) {
                        var d = params.data;
                        return '<div style="font-weight:bold;color:#e94560;margin-bottom:4px;">' + (d.class_name || 'Object') + '</div>' +
                               '<div>Retained: <span style="color:#00d9ff;">' + formatBytes(d.retained_size || 0) + '</span></div>' +
                               '<div>Shallow: <span style="color:#00d9ff;">' + formatBytes(d.shallow_size || 0) + '</span></div>';
                    }
                },
                series: [{
                    type: 'sunburst',
                    radius: [0, '95%'],
                    data: [data],
                    sort: 'desc',
                    emphasis: {
                        focus: 'ancestor',
                        itemStyle: { opacity: 1 }
                    },
                    label: {
                        color: '#eee',
                        fontSize: 10,
                        rotate: 'radial',
                        formatter: function(params) {
                            return truncate(params.name, 10);
                        }
                    },
                    levels: [
                        {},
                        { label: { rotate: 'tangential' } },
                        { label: { rotate: 'radial' } }
                    ]
                }]
            }, true);

            var legend = document.getElementById('sunburst-legend');
            legend.innerHTML = '';
            classColors.forEach(function(color, name) {
                legend.innerHTML += '<div class="legend-item"><div class="legend-color" style="background:' + color + '"></div>' + name + '</div>';
            });
        }

        // Collapsible Tree View with incremental loading
        async function initTreeView() {
            treeNodeMap.clear();
            loadedChildren.clear();

            try {
                var res = await fetch(API_BASE + '/dominance/tree');
                var data = await res.json();

                if (!data.nodes || data.nodes.length === 0) return;

                data.nodes.forEach(function(n) {
                    treeNodeMap.set(n.id, Object.assign({}, n));
                });

                var rootNodes = data.nodes.filter(function(n) {
                    return n.parent_id === 0 || n.depth === 0;
                });

                treeRootData = {
                    id: 0,
                    class_name: 'Root',
                    retained_size: 0,
                    shallow_size: 0,
                    depth: -1,
                    parent_id: 0,
                    children: rootNodes.map(function(n) {
                        return {
                            id: n.id,
                            class_name: n.class_name,
                            retained_size: n.retained_size,
                            shallow_size: n.shallow_size,
                            depth: n.depth,
                            parent_id: n.parent_id,
                            instance_count: n.instance_count,
                            is_clustered: n.is_clustered,
                            is_cutoff: n.is_cutoff,
                            children: null,
                            _loaded: false,
                            _hasChildren: Array.from(treeNodeMap.values()).some(function(x) {
                                return x.parent_id === n.id;
                            })
                        };
                    }),
                    _loaded: true
                };

                drawTree();
            } catch (e) {
                document.getElementById('tree-view').innerHTML = '<div class="error">Failed to load tree</div>';
            }
        }

        function drawTree() {
            if (!treeChart) {
                treeChart = echarts.init(document.getElementById('tree-view'));

                treeChart.on('click', async function(params) {
                    var d = params.data;
                    if (!d._hasChildren) return;

                    if (d._loaded) {
                        d._children = d.children;
                        d.children = null;
                        d._loaded = false;
                        treeChart.setOption({ series: [{ data: [treeRootData] }] });
                    } else if (d._children) {
                        d.children = d._children;
                        d._children = null;
                        d._loaded = true;
                        treeChart.setOption({ series: [{ data: [treeRootData] }] });
                    } else {
                        try {
                            var res = await fetch(API_BASE + '/dominance/children?parent_id=' + d.id);
                            var data = await res.json();

                            if (data.nodes && data.nodes.length > 0) {
                                loadedChildren.set(d.id, data.nodes);

                                d.children = data.nodes.map(function(n) {
                                    return {
                                        id: n.id,
                                        class_name: n.class_name,
                                        retained_size: n.retained_size,
                                        shallow_size: n.shallow_size,
                                        depth: n.depth,
                                        parent_id: n.parent_id,
                                        instance_count: n.instance_count,
                                        is_clustered: n.is_clustered,
                                        is_cutoff: n.is_cutoff,
                                        children: null,
                                        _children: null,
                                        _loaded: false,
                                        _hasChildren: Array.from(treeNodeMap.values()).some(function(x) {
                                            return x.parent_id === n.id;
                                        })
                                    };
                                });
                                d._loaded = true;
                                treeChart.setOption({ series: [{ data: [treeRootData] }] });
                            }
                        } catch (e) {
                            console.error('Failed to load children:', e);
                        }
                    }
                });
            }

            treeChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#16213e',
                    borderColor: '#e94560',
                    borderWidth: 1,
                    textStyle: { color: '#eee', fontSize: 12 },
                    padding: [10, 14],
                    formatter: function(params) {
                        var d = params.data;
                        return '<div style="font-weight:bold;color:#e94560;margin-bottom:4px;">' + (d.class_name || 'Object') + '</div>' +
                               '<div>Retained: <span style="color:#00d9ff;">' + formatBytes(d.retained_size || 0) + '</span></div>' +
                               '<div>Shallow: <span style="color:#00d9ff;">' + formatBytes(d.shallow_size || 0) + '</span></div>';
                    }
                },
                series: [{
                    type: 'tree',
                    data: [treeRootData],
                    top: '5%',
                    left: '5%',
                    bottom: '5%',
                    right: '20%',
                    layout: 'orthogonal',
                    orient: 'LR',
                    symbol: 'circle',
                    symbolSize: 12,
                    roam: false,
                    expandAndCollapse: false,
                    animationDuration: 300,
                    animationDurationUpdate: 300,
                    label: {
                        color: '#eee',
                        fontSize: 11,
                        position: 'right',
                        verticalAlign: 'middle',
                        align: 'left',
                        formatter: function(params) {
                            var d = params.data;
                            var prefix = (d._hasChildren && !d._loaded) ? '+ ' : '';
                            return prefix + truncate(d.class_name || ('obj' + d.id), 15) + ' (' + formatBytes(d.retained_size || 0) + ')';
                        }
                    },
                    lineStyle: {
                        color: '#0f3460',
                        width: 1.5,
                        curveness: 0.5
                    },
                    itemStyle: {
                        color: function(params) {
                            return params.data.depth === 0 ? '#e94560' : '#00d9ff';
                        },
                        borderColor: '#0f3460',
                        borderWidth: 2
                    },
                    emphasis: {
                        itemStyle: {
                            borderColor: '#e94560'
                        }
                    }
                }]
            });
        }

        function truncate(str, len) {
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Load top 10 objects
        async function loadTop10() {
            try {
                const res = await fetch(`${API_BASE}/dominance/top10`);
                const data = await res.json();

                if (data.items.length === 0) {
                    document.getElementById('top10-table').innerHTML = '<div class="loading">No data</div>';
                    return;
                }

                let html = '<table style="table-layout:fixed;width:100%;"><colgroup><col style="width:45px;"><col><col style="width:130px;"><col style="width:110px;"><col style="width:70px;"></colgroup><tr><th>Rank</th><th>Type</th><th>Object ID</th><th>Retained Size</th><th>Percentage</th></tr>';
                for (const item of data.items) {
                    html += `<tr>
                        <td>${item.rank}</td>
                        <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(item.type)}">${escapeHtml(item.type)}</td>
                        <td>0x${item.object_id.toString(16)}</td>
                        <td>${formatBytes(item.retained_size)}</td>
                        <td>${item.percentage.toFixed(2)}%</td>
                    </tr>`;
                }
                html += '</table>';
                document.getElementById('top10-table').innerHTML = html;
            } catch (e) {
                document.getElementById('top10-table').innerHTML = '<div class="error">Failed to load top 10 data</div>';
            }
        }

        // Load fragment overview
        async function loadFragmentOverview() {
            try {
                const [overviewRes, layoutRes] = await Promise.all([
                    fetch(`${API_BASE}/fragment/overview`),
                    fetch(`${API_BASE}/fragment/layout`)
                ]);
                const overview = await overviewRes.json();
                const layout = await layoutRes.json();

                // Overview section
                document.getElementById('fragment-summary').innerHTML = `
                    <div class="stat">
                        <div class="stat-value">${formatBytes(overview.used_size)}</div>
                        <div class="stat-label">Used</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${formatBytes(overview.heap_limit)}</div>
                        <div class="stat-label">Heap Limit</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${overview.utilization.toFixed(1)}%</div>
                        <div class="stat-label">Utilization</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${Math.min(overview.utilization, 100)}%"></div>
                    </div>
                    <div class="progress-label">
                        <span>0</span>
                        <span>${formatBytes(overview.heap_limit)}</span>
                    </div>
                `;

                // Layout section
                if (layout.regions) {
                    let layoutHtml = '<div class="fragment-grid">';
                    layout.regions.forEach(r => {
                        layoutHtml += `
                            <div class="fragment-item">
                                <div class="value">${formatBytes(r.size)}</div>
                                <div class="label">${r.type}</div>
                            </div>
                        `;
                    });
                    layoutHtml += '</div>';
                    document.getElementById('fragment-layout').innerHTML = layoutHtml;
                }
            } catch (e) {
                document.getElementById('fragment-summary').innerHTML = '<div class="error">Failed to load fragment data</div>';
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        window.addEventListener('resize', () => {
            if (sunburstChart) sunburstChart.resize();
            if (treeChart) treeChart.resize();
        });

        // Initial load
        loadDominanceTree();
        loadFragmentOverview();
    </script>
</body>
</html>
